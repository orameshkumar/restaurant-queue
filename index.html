<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/restaurant-queue/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <link rel="manifest" href="/restaurant-queue/manifest.json" />
    <title>Restaurant Queue</title>
    <script>
      // Restore path encoded by 404.html redirect (GitHub Pages SPA trick)
      (function() {
        var p = window.location.search.slice(1).split('&').filter(function(s){ return s.startsWith('p=/'); });
        if (p.length) {
          var path = p[0].replace('p=', '').replace(/~and~/g, '&');
          var q = window.location.search.slice(1).split('&').filter(function(s){ return s.startsWith('q='); });
          var query = q.length ? '?' + q[0].replace('q=', '').replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, '/restaurant-queue' + path + query + window.location.hash);
        }
      })();
    </script>
    <script type="module" crossorigin src="/restaurant-queue/assets/index-BUJi7EtZ.js"></script>
    <link rel="stylesheet" crossorigin href="/restaurant-queue/assets/index-BZVPRhSx.css">
  </head>

    <div id="root"></div>
  </body>
</html>
